<style>
:root{
  --brand:#22D3EE;
  --brand-2:#06B6D4;
  --muted:#94A3B8;
  --border: rgba(34, 211, 238, 0.35);
  --bg: #020617;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
input, textarea { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }

body {
  font-family: "Inter", sans-serif;
  background: linear-gradient(135deg, #093440 0%, #020617 40%, #020617 100%);
  background-attachment: fixed;
  color: #ECFEFF;
  overflow-x: hidden;
}


.services{padding: 72px 20px; min-height: 100vh;}
.services__grid{max-width: 1150px; margin: 0 auto; display:grid; grid-template-columns: 1.15fr .85fr; gap: 28px; align-items:start; padding-top: 80px;}
@media (max-width: 920px){ .services__grid{grid-template-columns: 1fr; } }

.services__list{border-top:1px solid rgba(255,255,255,.08);}
.srv{
  width:100%; background:transparent; border:0; color:#fff; text-align:left;
  display:flex; align-items:center; gap:18px;
  padding: 26px 8px; border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer; position:relative; font-family: "Inter", sans-serif;
}
.srv__no{color: rgba(34,211,238,.75); font-weight:700; width:52px;}
.srv__title{font-size: clamp(22px, 4.2vw, 42px); font-weight:800; letter-spacing:-.02em;}
.srv__icon{
  margin-left:auto; width:44px; height:44px; display:grid; place-items:center;
  color: var(--brand); border:1px solid var(--border); border-radius: 14px;
  transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
}
.srv:hover .srv__icon{ transform: translateY(-1px); box-shadow: 0 0 0 6px rgba(34,211,238,.08); }

.srv.is-active::after{
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: linear-gradient(var(--brand), transparent);
  box-shadow: 0 0 18px rgba(34,211,238,.35);
}
.srv.is-active .srv__icon{ background: rgba(34,211,238,.08); transform: rotate(45deg); }

.services__preview{position:sticky; top: 90px;}
@media (max-width: 920px){ .services__preview{position:relative; top:auto;} }

.previewCard{
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 24px;
  padding: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  box-shadow: 0 20px 80px rgba(0,0,0,.45);
  overflow:hidden;
}
.previewCard__top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 10px;}
.previewTag{
  font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  color: rgba(255,255,255,.75);
  border:1px solid rgba(255,255,255,.10); padding:8px 10px; border-radius:999px;
}
.previewKpi{color: var(--muted); font-size:13px;}
.previewTitle{font-size: 26px; margin: 8px 0 6px;}
.previewDesc{color: rgba(255,255,255,.78); line-height:1.6; margin:0 0 14px;}
.previewChips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 16px;}
.chip{
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.18);
  color: rgba(255,255,255,.82);
  padding:8px 10px; border-radius: 999px; font-size:12px;
}
.previewMock{position:relative; border-radius: 18px; border:1px solid rgba(255,255,255,.08); height: 220px; overflow:hidden; background: rgba(0,0,0,.25);}
.mockGlow{
  position:absolute; inset:-80px; background: radial-gradient(circle at 30% 30%, rgba(34,211,238,.24), transparent 55%);
  filter: blur(10px);
}
.mockFrame{position:absolute; inset:18px; border-radius: 14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03); padding:16px;}
.mockLine{height:12px; border-radius: 999px; background: rgba(255,255,255,.10); margin-bottom: 12px;}
.mockLine.short{width:62%;}

/* SITE LOGO */
.site-logo {
  position: fixed;
  top: 28px;
  left: clamp(20px, 5vw, 48px);
  z-index: 1001;
  text-decoration: none;
}
.site-logo img {
  height: 110px;
  width: auto;
  display: block;
  transition: opacity 0.3s ease;
}
.site-logo:hover img { opacity: 0.8; }
@media (max-width: 1024px) {
  body.menu-open .site-logo { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
}

/* MENU */
.floating-menu-btn {
  position: fixed; top: 36px; right: clamp(20px, 5vw, 48px); z-index: 1001;
  display: flex; align-items: center; gap: 18px; background: none; border: none;
  color: white; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: clamp(20px, 3vw, 35px); letter-spacing: 0.12em; text-transform: uppercase;
  transition: transform 0.35s ease, opacity 0.25s ease;
}
.floating-menu-btn:hover { transform: translateY(-2px); opacity: 0.9; }
.menu-lines { width: 34px; height: 3px; background: white; position: relative; }
.menu-lines::before, .menu-lines::after { content: ""; position: absolute; left: 0; width: 34px; height: 3px; background: white; transition: transform 0.3s ease; }
.menu-lines::before { top: -11px; } .menu-lines::after { top: 11px; }

.menu-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.55); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity 0.35s ease; z-index: 999; }
.menu-overlay.active { opacity: 1; pointer-events: auto; }
.side-menu { position: fixed; top: 0; right: 0; height: 100vh; width: min(90%, 420px); z-index: 1000; background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.95)); backdrop-filter: blur(18px); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.4s cubic-bezier(.4,0,.2,1); padding: 40px 30px; display: flex; flex-direction: column; }
.side-menu.active { transform: translateX(0); }
.close-menu { background: none; border: none; color: var(--muted); font-size: 26px; cursor: pointer; margin-bottom: 50px; align-self: flex-start; }
.side-nav { display: flex; flex-direction: column; gap: 22px; }
.side-nav a { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(22px, 3vw, 32px); text-transform: uppercase; color: white; text-decoration: none; transition: transform 0.35s ease, color 0.35s ease; }
.side-nav a:hover { transform: translateX(10px); color: var(--brand); }

.lang-switcher { display: flex; gap: 20px; margin-top: auto; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); }
.lang-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: color 0.3s; font-family: 'Inter', sans-serif; }
.lang-btn.active { color: var(--brand); }
.lang-btn:hover { color: #fff; }
</style>
</head>

<section class="services" id="services">
  <div class="services__grid">

      <button class="srv is-active" role="tab" aria-selected="true" data-key="dev">

      <button class="srv" role="tab" aria-selected="false" data-key="web">

        <span class="srv__title" data-i18n="sat_srv2">Web Dizajn i UX</span>

      </button>

      <button class="srv" role="tab" aria-selected="false" data-key="mkt">
        <span class="srv__no">03</span>
        <span class="srv__title" data-i18n="sat_srv3">Digitalni Marketing</span>

      </button>

      <button class="srv" role="tab" aria-selected="false" data-key="brand">
        <span class="srv__no">04</span>
        <span class="srv__title" data-i18n="sat_srv4">Brendiranje</span>
        <span class="srv__icon" aria-hidden="true">+</span>
      </button>
    </div>

    <aside class="services__preview" aria-live="polite">
      <div class="previewCard">
        <div class="previewCard__top">
          <div class="previewTag" id="pTag">End-to-end build</div>
          <div class="previewKpi" id="pKpi">Brzina • UX • Konverzije</div>
        </div>

        <h3 class="previewTitle" id="pTitle">App & Game Dev</h3>
        <p class="previewDesc" id="pDesc">
          Prototip → produkcija. Fokus na performanse, UX i "polish" koji razlikuje prosječno od premium.
        </p>

        <div class="previewChips" id="pChips">
          <span class="chip">Unity / Unreal</span>
          <span class="chip">Backend API</span>
          <span class="chip">UI & Animacije</span>
        </div>

        <div class="previewMock" id="pMock">

          <div class="mockFrame">

            <div class="mockLine"></div>
            <div class="mockLine short"></div>
          </div>
        </div>
      </div>
    </aside>
  </div>
</section>

<script>
const DATA_ALL = {
  hr: {
    dev: { tag: "End-to-end build", kpi: "Performanse • UX • Polish", title: "App & Game Dev", desc: "Prototip → produkcija. Fokus na stabilnost, osjećaj kontrole i vizualni polish.", chips: ["Unity / Unreal", "Backend API", "UI & Animacije"] },
    web: { tag: "Premium web iskustvo", kpi: "Brzina • SEO • Konverzije", title: "Web Dizajn i UX", desc: "Dizajn koji izgleda skupo i radi brzo. Informacijska arhitektura, UI sustav, animacije i SEO osnova.", chips: ["UX & UI System", "Animacije", "SEO + Schema"] },
    mkt: { tag: "Growth & performance", kpi: "Leadovi • ROAS • Analitika", title: "Digitalni Marketing", desc: "Kampanje i sadržaj koji mjeri rezultat. Tracking, funnel logika i optimizacije kroz podatke.", chips: ["Meta/Google", "Tracking", "Landing optimizacija"] },
    brand: { tag: "Brand koji ulijeva povjerenje", kpi: "Identitet • Ton • Konzistentnost", title: "Brendiranje", desc: "Vizualni identitet i guidelines koji čine da djeluješ veće i ozbiljnije. Od logotipa do web primjene.", chips: ["Logo & Grid", "Brand guide", "Design system"] }
  },
  en: {
    dev: { tag: "End-to-end build", kpi: "Performance • UX • Polish", title: "App & Game Dev", desc: "Prototype → production. Focus on stability, control feel, and visual polish.", chips: ["Unity / Unreal", "Backend API", "UI & Animations"] },
    web: { tag: "Premium web experience", kpi: "Speed • SEO • Conversions", title: "Web Design & UX", desc: "Design that looks expensive and runs fast. Information architecture, UI system, animations, and SEO foundation.", chips: ["UX & UI System", "Animations", "SEO + Schema"] },
    mkt: { tag: "Growth & performance", kpi: "Leads • ROAS • Analytics", title: "Digital Marketing", desc: "Campaigns and content that measure results. Tracking, funnel logic, and data-driven optimization.", chips: ["Meta/Google", "Tracking", "Landing optimization"] },
    brand: { tag: "Brand that inspires trust", kpi: "Identity • Tone • Consistency", title: "Branding", desc: "Visual identity and guidelines that make you look bigger and more serious. From logo to web implementation.", chips: ["Logo & Grid", "Brand guide", "Design system"] }
  },
  de: {
    dev: { tag: "End-to-end Build", kpi: "Performance • UX • Polish", title: "App- & Spieleentwicklung", desc: "Prototyp → Produktion. Fokus auf Stabilität, Kontrolle und visuellen Polish.", chips: ["Unity / Unreal", "Backend API", "UI & Animationen"] },
    web: { tag: "Premium-Web-Erlebnis", kpi: "Geschwindigkeit • SEO • Conversions", title: "Webdesign & UX", desc: "Design, das teuer aussieht und schnell läuft. Informationsarchitektur, UI-System, Animationen und SEO-Grundlage.", chips: ["UX & UI System", "Animationen", "SEO + Schema"] },
    mkt: { tag: "Wachstum & Performance", kpi: "Leads • ROAS • Analytik", title: "Digitales Marketing", desc: "Kampagnen und Inhalte, die Ergebnisse messen. Tracking, Funnel-Logik und datengesteuerte Optimierung.", chips: ["Meta/Google", "Tracking", "Landing-Optimierung"] },
    brand: { tag: "Marke, die Vertrauen schafft", kpi: "Identität • Ton • Konsistenz", title: "Branding", desc: "Visuelle Identität und Richtlinien, die Sie größer und seriöser wirken lassen. Vom Logo bis zur Web-Umsetzung.", chips: ["Logo & Grid", "Brand Guide", "Design System"] }
  },
  es: {
    dev: { tag: "Construcción completa", kpi: "Rendimiento • UX • Acabado", title: "Desarrollo de Apps y Juegos", desc: "Prototipo → producción. Enfoque en estabilidad, control y acabado visual.", chips: ["Unity / Unreal", "Backend API", "UI y Animaciones"] },
    web: { tag: "Experiencia web premium", kpi: "Velocidad • SEO • Conversiones", title: "Diseño Web y UX", desc: "Diseño que se ve caro y funciona rápido. Arquitectura de información, sistema UI, animaciones y base SEO.", chips: ["UX & UI System", "Animaciones", "SEO + Schema"] },
    mkt: { tag: "Crecimiento y rendimiento", kpi: "Leads • ROAS • Analítica", title: "Marketing Digital", desc: "Campañas y contenido que miden resultados. Tracking, lógica de embudo y optimización basada en datos.", chips: ["Meta/Google", "Tracking", "Optimización de landing"] },
    brand: { tag: "Marca que inspira confianza", kpi: "Identidad • Tono • Consistencia", title: "Branding", desc: "Identidad visual y directrices que te hacen parecer más grande y serio. Del logo a la implementación web.", chips: ["Logo & Grid", "Brand guide", "Design system"] }
  }
};
let currentLang = 'hr';
function getDATA() { return DATA_ALL[currentLang] || DATA_ALL['hr']; }

const buttons = document.querySelectorAll(".srv");
const pTag = document.getElementById("pTag");
const pKpi = document.getElementById("pKpi");
const pTitle = document.getElementById("pTitle");
const pDesc = document.getElementById("pDesc");
const pChips = document.getElementById("pChips");

let activeKey = 'dev';
function render(key){
  if (key) activeKey = key;
  const d = getDATA()[activeKey];
  if (!d) return;
  pTag.textContent = d.tag;
  pKpi.textContent = d.kpi;
  pTitle.textContent = d.title;
  pDesc.textContent = d.desc;
  pChips.innerHTML = d.chips.map(t => `<span class="chip">${t}</span>`).join("");
}

buttons.forEach(b => {
  b.addEventListener("click", () => {
    buttons.forEach(x => {
      x.classList.remove("is-active");
      x.setAttribute("aria-selected", "false");
    });
    b.classList.add("is-active");
    b.setAttribute("aria-selected", "true");
    render(b.dataset.key);
  });
});
</script>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");
  const closeMenu = document.getElementById("closeMenu");
  const overlay = document.getElementById("menuOverlay");

  menuBtn.addEventListener("click", () => {
    sideMenu.classList.toggle("active");
    overlay.classList.toggle("active");
    document.body.classList.toggle("menu-open");
  });
  closeMenu.addEventListener("click", () => {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
    document.body.classList.remove("menu-open");
  });
  overlay.addEventListener("click", () => {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
    document.body.classList.remove("menu-open");
  });
</script>

<script>
const translations = {
  en: { menu_home: "Home", menu_services: "Services", menu_work: "Work", menu_blog: "Blog", menu_contact: "Contact", menu_btn: "MENU",
    sat_srv1: "App & Game Dev", sat_srv2: "Web Design & UX", sat_srv3: "Digital Marketing", sat_srv4: "Branding" },
  hr: { menu_home: "Početna", menu_services: "Usluge", menu_work: "Projekti", menu_blog: "Blog", menu_contact: "Kontakt", menu_btn: "IZBORNIK",
    sat_srv1: "App & Game Dev", sat_srv2: "Web Dizajn i UX", sat_srv3: "Digitalni Marketing", sat_srv4: "Brendiranje" },
  de: { menu_home: "Startseite", menu_services: "Leistungen", menu_work: "Projekte", menu_blog: "Blog", menu_contact: "Kontakt", menu_btn: "MENÜ",
    sat_srv1: "App- & Spieleentwicklung", sat_srv2: "Webdesign & UX", sat_srv3: "Digitales Marketing", sat_srv4: "Branding" },
  es: { menu_home: "Inicio", menu_services: "Servicios", menu_work: "Trabajo", menu_blog: "Blog", menu_contact: "Contacto", menu_btn: "MENÚ",
    sat_srv1: "Desarrollo de Apps y Juegos", sat_srv2: "Diseño Web y UX", sat_srv3: "Marketing Digital", sat_srv4: "Branding" }
};

function setLang(lang) {
  sessionStorage.setItem('lang_set', lang);
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  const langBtn = document.getElementById('btn-' + lang);
  if (langBtn) langBtn.classList.add('active');
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
  });
  render();
}

(function() {
  const saved = sessionStorage.getItem('lang_set');
  if (saved) { setLang(saved); return; }
  fetch('https://ipapi.co/json/')
    .then(r => r.json())
    .then(data => {
      const cc = (data.country_code || '').toUpperCase();
      let lang = 'en';
      if (['DE','AT','CH'].includes(cc)) lang = 'de';
      else if (['HR','BA','RS','ME','MK','SI','BG','XK'].includes(cc)) lang = 'hr';
      else if (cc === 'ES') lang = 'es';
      setLang(lang);
    })
    .catch(() => setLang('en'));
})();
</script>
